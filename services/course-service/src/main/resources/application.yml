server:
  port: 8082

spring:
  application:
    name: sagelms-course-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sagelms}
    username: ${DB_USER:sagelms}
    password: ${DB_PASSWORD:sagelms}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: course

  flyway:
    schemas: course
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  gateway:
    secret: ${GATEWAY_SHARED_SECRET:dev-gateway-secret-change-me}
  internal:
    secret: ${INTERNAL_API_SECRET:dev-internal-secret-change-me}
  auth-service:
    url: http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}
