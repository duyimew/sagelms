server:
  port: 8081

spring:
  application:
    name: sagelms-auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sagelms}
    username: ${DB_USER:sagelms}
    password: ${DB_PASSWORD:sagelms}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth

  flyway:
    schemas: auth
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production}
    access-token-expiry-ms: 1800000
    refresh-token-expiry-ms: 604800000
  gateway:
    secret: ${GATEWAY_SHARED_SECRET:dev-gateway-secret-change-me}
  internal:
    secret: ${INTERNAL_API_SECRET:dev-internal-secret-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info
