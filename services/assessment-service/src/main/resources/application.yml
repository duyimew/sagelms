server:
  port: 8085

spring:
  application:
    name: assessment-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sagelms}
    username: ${DB_USER:sagelms}
    password: ${DB_PASSWORD:sagelms}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    schemas: assessment
    default-schema: assessment
    create-schemas: true

app:
  internal:
    secret: ${INTERNAL_API_SECRET:sagelms-dev-internal-secret}
  course-service:
    base-url: http://${COURSE_SERVICE_HOST:localhost}:${COURSE_SERVICE_PORT:8082}
