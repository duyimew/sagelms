# Test profile - use H2 in-memory DB
spring:
  datasource:
    url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS assessment"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: assessment
  flyway:
    enabled: false

app:
  internal:
    secret: test-internal-secret
  course-service:
    base-url: http://localhost:8082
