server:
  port: 8083

spring:
  application:
    name: sagelms-content-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sagelms}
    username: ${DB_USER:sagelms}
    password: ${DB_PASSWORD:sagelms}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: content

  flyway:
    schemas: content
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  gateway:
    secret: ${GATEWAY_SHARED_SECRET:dev-gateway-secret-change-me}
  course-service:
    url: http://${COURSE_SERVICE_HOST:localhost}:${COURSE_SERVICE_PORT:8082}
  internal:
    secret: ${INTERNAL_API_SECRET:dev-internal-secret-change-me}
  storage:
    upload-dir: ${CONTENT_UPLOAD_DIR:uploads/content}
