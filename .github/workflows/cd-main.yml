name: CD - Build Scan Push Deploy PR

on:
  push:
    branches:
      - main
    paths-ignore:
      - "infra/k8s/devsecops/apps/kustomization.yaml"
      - "reports/**"
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to build, or all. Deployable values: web,gateway,auth-service,course-service,content-service,progress-service,assessment-service,challenge-service."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  security-events: write
  id-token: write

env:
  KUSTOMIZATION_FILE: infra/k8s/devsecops/apps/kustomization.yaml
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
  GCP_SECRET_HARBOR_ROBOT_CI_PUSH: ${{ vars.GCP_SECRET_HARBOR_ROBOT_CI_PUSH || 'sagelms-devsecops-harbor-robot-ci-push' }}

concurrency:
  group: cd-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      auth_service: ${{ steps.filter.outputs.auth_service }}
      course_service: ${{ steps.filter.outputs.course_service }}
      content_service: ${{ steps.filter.outputs.content_service }}
      progress_service: ${{ steps.filter.outputs.progress_service }}
      assessment_service: ${{ steps.filter.outputs.assessment_service }}
      challenge_service: ${{ steps.filter.outputs.challenge_service }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ai_tutor_service: ${{ steps.filter.outputs.ai_tutor_service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/path-filters.yml

  plan:
    name: Plan deploy services
    runs-on: ubuntu-latest
    needs: detect
    outputs:
      services_count: ${{ steps.plan.outputs.services_count }}
    env:
      CHANGED_GATEWAY: ${{ needs.detect.outputs.gateway }}
      CHANGED_AUTH: ${{ needs.detect.outputs.auth_service }}
      CHANGED_COURSE: ${{ needs.detect.outputs.course_service }}
      CHANGED_CONTENT: ${{ needs.detect.outputs.content_service }}
      CHANGED_PROGRESS: ${{ needs.detect.outputs.progress_service }}
      CHANGED_ASSESSMENT: ${{ needs.detect.outputs.assessment_service }}
      CHANGED_CHALLENGE: ${{ needs.detect.outputs.challenge_service }}
      CHANGED_WEB: ${{ needs.detect.outputs.frontend }}
      CHANGED_AI_TUTOR: ${{ needs.detect.outputs.ai_tutor_service }}
      DISPATCH_SERVICES: ${{ github.event.inputs.services }}
      EVENT_NAME: ${{ github.event_name }}
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
    steps:
      - name: Plan deploy services
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p reports
          services=()
          add_service() {
            services+=("$1|$2|$3")
          }

          selected() {
            local service="$1"
            local changed="$2"

            if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
              local requested="${DISPATCH_SERVICES// /}"
              if [[ -z "$requested" || "$requested" == "all" ]]; then
                return 0
              fi

              IFS=',' read -ra items <<< "$requested"
              for item in "${items[@]}"; do
                [[ "$item" == "$service" ]] && return 0
              done
              return 1
            fi

            [[ "$changed" == "true" ]]
          }

          selected "gateway" "$CHANGED_GATEWAY" && add_service "gateway" "services/gateway" "java"
          selected "auth-service" "$CHANGED_AUTH" && add_service "auth-service" "services/auth-service" "java"
          selected "course-service" "$CHANGED_COURSE" && add_service "course-service" "services/course-service" "java"
          selected "content-service" "$CHANGED_CONTENT" && add_service "content-service" "services/content-service" "java"
          selected "progress-service" "$CHANGED_PROGRESS" && add_service "progress-service" "services/progress-service" "java"
          selected "assessment-service" "$CHANGED_ASSESSMENT" && add_service "assessment-service" "services/assessment-service" "java"
          selected "challenge-service" "$CHANGED_CHALLENGE" && add_service "challenge-service" "services/challenge-service" "java"
          selected "web" "$CHANGED_WEB" && add_service "web" "apps/web" "frontend"

          if [[ "$CHANGED_AI_TUTOR" == "true" ]]; then
            {
              echo "### ai-tutor-service"
              echo "ai-tutor-service changed, but it is intentionally excluded from GKE deployment in this phase."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          printf "%s\n" "${services[@]}" > reports/deploy-services.txt
          echo "services_count=${#services[@]}" >> "$GITHUB_OUTPUT"

          if [[ "${#services[@]}" -eq 0 ]]; then
            echo "No deployable service changes were detected." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### Deployable services"
            printf -- "- %s\n" "${services[@]}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy plan
        if: steps.plan.outputs.services_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-services
          path: reports/deploy-services.txt
          retention-days: 7

  validate:
    name: Validate deploy services
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.services_count != '0'
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download deploy plan
        uses: actions/download-artifact@v4
        with:
          name: deploy-services
          path: reports

      - name: Check registry configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "$REGISTRY_HOST" ]]; then
            echo "Missing repository variable: REGISTRY_HOST"
            missing=1
          fi
          if [[ -z "$REGISTRY_NAMESPACE" ]]; then
            echo "Missing repository variable: REGISTRY_NAMESPACE"
            missing=1
          fi
          if [[ -z "$GCP_PROJECT_ID" ]]; then
            echo "Missing repository variable: GCP_PROJECT_ID"
            missing=1
          fi
          if [[ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]]; then
            echo "Missing repository variable: GCP_WORKLOAD_IDENTITY_PROVIDER"
            missing=1
          fi
          if [[ -z "$GCP_SERVICE_ACCOUNT" ]]; then
            echo "Missing repository variable: GCP_SERVICE_ACCOUNT"
            missing=1
          fi
          if [[ -z "$GCP_SECRET_HARBOR_ROBOT_CI_PUSH" ]]; then
            echo "Missing repository variable: GCP_SECRET_HARBOR_ROBOT_CI_PUSH"
            missing=1
          fi
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Harbor robot secret access
        shell: bash
        run: |
          set -euo pipefail
          harbor_robot_json="$(gcloud secrets versions access latest --secret "$GCP_SECRET_HARBOR_ROBOT_CI_PUSH" --project "$GCP_PROJECT_ID")"
          if [[ -z "$harbor_robot_json" ]]; then
            echo "::error::Secret $GCP_SECRET_HARBOR_ROBOT_CI_PUSH has an empty latest version"
            exit 1
          fi
          echo "::add-mask::$harbor_robot_json"
          echo "Harbor robot secret is available."

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run service checks
        shell: bash
        run: |
          set -euo pipefail
          while IFS='|' read -r service context kind; do
            [[ -z "$service" ]] && continue
            echo "::group::Check $service"
            if [[ "$kind" == "java" ]]; then
              pushd "$context" >/dev/null
              chmod +x mvnw
              ./mvnw -B test
              popd >/dev/null
            elif [[ "$kind" == "frontend" ]]; then
              pushd "$context" >/dev/null
              npm ci --legacy-peer-deps
              npm run typecheck
              npm run lint
              npm test -- --run
              npm run build
              popd >/dev/null
            fi
            echo "::endgroup::"
          done < reports/deploy-services.txt

  build_scan_push:
    name: Build, scan, and push images
    runs-on: ubuntu-latest
    needs:
      - plan
      - validate
    if: needs.plan.outputs.services_count != '0'
    env:
      IMAGE_TAG: ${{ github.sha }}
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download deploy plan
        uses: actions/download-artifact@v4
        with:
          name: deploy-services
          path: reports

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install Trivy
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Harbor
        shell: bash
        run: |
          set -euo pipefail
          harbor_robot_json="$(gcloud secrets versions access latest --secret "$GCP_SECRET_HARBOR_ROBOT_CI_PUSH" --project "$GCP_PROJECT_ID")"
          if [[ -z "$harbor_robot_json" ]]; then
            echo "::error::Secret $GCP_SECRET_HARBOR_ROBOT_CI_PUSH has an empty latest version"
            exit 1
          fi

          registry_username="$(jq -r '.name // .username // .robot_name // empty' <<< "$harbor_robot_json")"
          registry_password="$(jq -r '.secret // .token // .password // empty' <<< "$harbor_robot_json")"

          if [[ -z "$registry_username" ]]; then
            echo "::error::Secret $GCP_SECRET_HARBOR_ROBOT_CI_PUSH must contain one of: name, username, robot_name"
            exit 1
          fi
          if [[ -z "$registry_password" ]]; then
            echo "::error::Secret $GCP_SECRET_HARBOR_ROBOT_CI_PUSH must contain one of: secret, token, password"
            exit 1
          fi

          echo "::add-mask::$registry_username"
          echo "::add-mask::$registry_password"
          printf '%s' "$registry_password" | docker login "$REGISTRY_HOST" --username "$registry_username" --password-stdin

      - name: Prepare deploy reports
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p reports/trivy "reports/sbom/$IMAGE_TAG" reports/cosign
          digest_report="reports/image-digests-$IMAGE_TAG.md"
          pr_body="reports/deploy-pr-body-$IMAGE_TAG.md"
          summary_report="reports/deploy-summary-$IMAGE_TAG.md"

          {
            echo "# Image digests for $IMAGE_TAG"
            echo
            echo "| Service | Image | Digest |"
            echo "| --- | --- | --- |"
          } > "$digest_report"

          {
            echo "# Deploy images to $IMAGE_TAG"
            echo
            echo "| Service | Image | Digest | Trivy | SBOM | Cosign |"
            echo "| --- | --- | --- | --- | --- | --- |"
          } > "$pr_body"

          {
            echo "## CD Deploy Summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Commit | \`$IMAGE_TAG\` |"
            echo "| Registry | \`$REGISTRY_HOST\` |"
            echo "| Namespace | \`$REGISTRY_NAMESPACE\` |"
            echo "| Manifest | \`$KUSTOMIZATION_FILE\` |"
            echo
            echo "### Images"
            echo
            echo "| Service | Image | Digest | Trivy | SBOM | Cosign |"
            echo "| --- | --- | --- | --- | --- | --- |"
          } > "$summary_report"

      - name: Build Docker images
        shell: bash
        run: |
          set -euo pipefail

          while IFS='|' read -r service context kind; do
            [[ -z "$service" ]] && continue
            image="$REGISTRY_HOST/$REGISTRY_NAMESPACE/$service:$IMAGE_TAG"

            echo "::group::Docker build $service"
            docker build -t "$image" "$context"
            echo "::endgroup::"
          done < reports/deploy-services.txt

      - name: Scan images and generate SBOM
        shell: bash
        run: |
          set -euo pipefail

          while IFS='|' read -r service context kind; do
            [[ -z "$service" ]] && continue
            image="$REGISTRY_HOST/$REGISTRY_NAMESPACE/$service:$IMAGE_TAG"
            trivy_report="reports/trivy/trivy-$service.txt"
            sbom_report="reports/sbom/$IMAGE_TAG/$service-sbom.cdx.json"

            echo "::group::Trivy scan $service"
            if ! trivy image --severity HIGH,CRITICAL --exit-code 1 --format table --output "$trivy_report" "$image"; then
              echo "Trivy found HIGH or CRITICAL vulnerabilities in $service."
              echo
              cat "$trivy_report"
              exit 1
            fi
            trivy image --format cyclonedx --output "$sbom_report" "$image"
            echo "::endgroup::"
          done < reports/deploy-services.txt

      - name: Push images and record digests
        shell: bash
        run: |
          set -euo pipefail

          digest_report="reports/image-digests-$IMAGE_TAG.md"
          pr_body="reports/deploy-pr-body-$IMAGE_TAG.md"
          summary_report="reports/deploy-summary-$IMAGE_TAG.md"

          while IFS='|' read -r service context kind; do
            [[ -z "$service" ]] && continue
            image="$REGISTRY_HOST/$REGISTRY_NAMESPACE/$service:$IMAGE_TAG"
            sbom_report="reports/sbom/$IMAGE_TAG/$service-sbom.cdx.json"

            docker push "$image"
            digest="$(docker buildx imagetools inspect "$image" --format '{{.Manifest.Digest}}')"
            digest_ref="$REGISTRY_HOST/$REGISTRY_NAMESPACE/$service@$digest"

            cosign sign --yes "$digest_ref" 2>&1 | tee "reports/cosign/cosign-sign-$service.txt"

            cosign attest --yes \
              --predicate "$sbom_report" \
              --type cyclonedx \
              "$digest_ref" 2>&1 | tee "reports/cosign/cosign-attest-sbom-$service.txt"

            echo "| $service | \`$image\` | \`$digest\` | PASS | \`$sbom_report\` | PASS |" >> "$pr_body"
            echo "| $service | \`$image\` | \`$digest\` | PASS | \`$sbom_report\` | PASS |" >> "$summary_report"
            echo "| $service | \`$image\` | \`$digest\` |" >> "$digest_report"
          done < reports/deploy-services.txt

      - name: Publish GitHub job summary
        shell: bash
        run: |
          set -euo pipefail

          summary_report="reports/deploy-summary-$IMAGE_TAG.md"
          cat "$summary_report" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy evidence
        uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence
          path: |
            reports/image-digests-${{ env.IMAGE_TAG }}.md
            reports/deploy-pr-body-${{ env.IMAGE_TAG }}.md
            reports/deploy-summary-${{ env.IMAGE_TAG }}.md
            reports/trivy/*.txt
            reports/sbom/${{ env.IMAGE_TAG }}/*.json
            reports/cosign/*.txt
          retention-days: 14

  deploy_pr:
    name: Open deploy PR
    runs-on: ubuntu-latest
    needs:
      - plan
      - build_scan_push
    if: needs.plan.outputs.services_count != '0'
    env:
      IMAGE_TAG: ${{ github.sha }}
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download deploy plan
        uses: actions/download-artifact@v4
        with:
          name: deploy-services
          path: reports

      - name: Download deploy evidence
        uses: actions/download-artifact@v4
        with:
          name: deploy-evidence
          path: reports

      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update deployment manifest image tags
        shell: bash
        run: |
          set -euo pipefail

          while IFS='|' read -r service context kind; do
            [[ -z "$service" ]] && continue
            image_name="$REGISTRY_HOST/$REGISTRY_NAMESPACE/$service"
            export IMAGE_NAME="$image_name"
            yq -i '(.images[] | select(.newName == env(IMAGE_NAME)) | .newTag) = env(IMAGE_TAG)' "$KUSTOMIZATION_FILE"
          done < reports/deploy-services.txt

      - name: Publish GitHub job summary
        shell: bash
        run: |
          set -euo pipefail

          summary_report="reports/deploy-summary-$IMAGE_TAG.md"
          {
            cat "$summary_report"
            echo
            echo "### Deploy PR"
            echo
            echo "A deploy PR will update \`$KUSTOMIZATION_FILE\` to image tag \`$IMAGE_TAG\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create deploy PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: chore/deploy-${{ env.IMAGE_TAG }}
          delete-branch: true
          title: "chore(deploy): update images to ${{ env.IMAGE_TAG }} [skip ci]"
          body-path: reports/deploy-pr-body-${{ env.IMAGE_TAG }}.md
          commit-message: "chore(deploy): update images to ${{ env.IMAGE_TAG }} [skip ci]"
          add-paths: |
            infra/k8s/devsecops/apps/kustomization.yaml
            reports
