name: CI (PR)

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------
  # Secret scan — always runs
  # --------------------------------------------------
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --redact

  # --------------------------------------------------
  # Conventions: PR Title
  # --------------------------------------------------
  pr_title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
            revert

  # --------------------------------------------------
  # Conventions: Branch Naming
  # --------------------------------------------------
  conventions_branch:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == dependabot/* ]]; then
            echo "✅ Dependabot branch allowed"
          elif [[ ! "$BRANCH" =~ ^(feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert)\/[a-zA-Z0-9_-]+(\/[a-zA-Z0-9_-]+)*$ ]]; then
            echo "❌ Invalid branch name: $BRANCH"
            echo "✅ Expected: <type>/<slug> (e.g., feat/auth-login) or dependabot/*"
            exit 1
          fi
          echo "✅ Branch name OK"

  # --------------------------------------------------
  # Conventions: Commit Messages
  # --------------------------------------------------
  conventions_commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm i -D @commitlint/cli @commitlint/config-conventional

      - name: Lint commits in PR range
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Base: $BASE"
          echo "Head: $HEAD"
          npx commitlint --from "$BASE" --to "$HEAD" --verbose

  # --------------------------------------------------
  # Path filter — detect which services changed
  # --------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      frontend: ${{ steps.filter.outputs.frontend }}
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'services/gateway/**'
              - 'services/auth-service/**'
              - 'services/course-service/**'
              - 'services/content-service/**'
              - 'services/challenge-service/**'
              - 'services/progress-service/**'
              - 'services/assessment-service/**'
              - 'services/worker/**'
            frontend:
              - 'apps/web/**'
            python:
              - 'services/ai-tutor-service/**'
            docker:
              - 'apps/web/Dockerfile'
              - 'apps/web/nginx.conf'
              - 'services/gateway/Dockerfile'
              - 'services/gateway/.dockerignore'
              - 'services/auth-service/Dockerfile'
              - 'services/auth-service/.dockerignore'
              - 'services/course-service/Dockerfile'
              - 'services/course-service/.dockerignore'
              - 'services/content-service/Dockerfile'
              - 'services/content-service/.dockerignore'
              - 'services/challenge-service/Dockerfile'
              - 'services/challenge-service/.dockerignore'
              - 'infra/docker/**'
              - 'scripts/docker/**'
              - 'docs/docker-images.md'

  # --------------------------------------------------
  # Unit tests — Java services (matrix)
  # --------------------------------------------------
  test_java:
    needs: changes
    if: needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - auth-service
          - course-service
          - content-service
          - challenge-service
          - progress-service
          - assessment-service
          - worker
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Run tests
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw && ./mvnw -B test --no-transfer-progress
          else
            mvn -B test --no-transfer-progress
          fi

  # --------------------------------------------------
  # Frontend — ESLint
  # --------------------------------------------------
  lint_frontend:
    name: "Frontend: ESLint"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  # --------------------------------------------------
  # Frontend — TypeScript Type Check
  # --------------------------------------------------
  typecheck_frontend:
    name: "Frontend: TypeScript"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  # --------------------------------------------------
  # Frontend — Production Build
  # --------------------------------------------------
  build_frontend:
    name: "Frontend: Build"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  # --------------------------------------------------
  # Frontend — Unit Tests (Vitest)
  # --------------------------------------------------
  test_frontend:
    name: "Frontend: Tests"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test -- --run

  # --------------------------------------------------
  # Python — Ruff Lint & Format Check
  # --------------------------------------------------
  lint_python:
    name: "Python: Ruff"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-tutor-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  # --------------------------------------------------
  # Python — Unit Tests (pytest)
  # --------------------------------------------------
  test_python:
    name: "Python: Tests"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-tutor-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -v

  # --------------------------------------------------
  # Docker — Build and supply-chain checks (no push)
  # --------------------------------------------------
  docker_build:
    name: "Docker: Build, scan, SBOM"
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.java == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: apps/web
          - service: gateway
            context: services/gateway
          - service: auth-service
            context: services/auth-service
          - service: course-service
            context: services/course-service
          - service: content-service
            context: services/content-service
          - service: challenge-service
            context: services/challenge-service
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sagelms-${{ matrix.service }}:ci-test ${{ matrix.context }}
      - name: Generate Trivy report
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: sagelms-${{ matrix.service }}:ci-test
          format: table
          output: trivy-${{ matrix.service }}.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: sagelms-${{ matrix.service }}:ci-test
          format: cyclonedx
          output: sbom-${{ matrix.service }}.cdx.json
          exit-code: "0"
      - name: Upload image evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-evidence-${{ matrix.service }}
          path: |
            trivy-${{ matrix.service }}.txt
            sbom-${{ matrix.service }}.cdx.json
      - name: Generate critical vulnerability report
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: sagelms-${{ matrix.service }}:ci-test
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "0"

  # --------------------------------------------------
  # Status gate — single check for branch protection
  # --------------------------------------------------
  ci_status:
    name: CI Status
    if: always()
    needs:
      - secret_scan
      - pr_title
      - conventions_branch
      - conventions_commits
      - test_java
      - lint_frontend
      - typecheck_frontend
      - build_frontend
      - test_frontend
      - lint_python
      - test_python
      - docker_build
    runs-on: ubuntu-latest
    steps:
      - name: Check all job statuses
        run: |
          echo "=== CI Status Report ==="
          results=(
            "secret_scan:${{ needs.secret_scan.result }}"
            "pr_title:${{ needs.pr_title.result }}"
            "conventions_branch:${{ needs.conventions_branch.result }}"
            "conventions_commits:${{ needs.conventions_commits.result }}"
            "test_java:${{ needs.test_java.result }}"
            "lint_frontend:${{ needs.lint_frontend.result }}"
            "typecheck_frontend:${{ needs.typecheck_frontend.result }}"
            "build_frontend:${{ needs.build_frontend.result }}"
            "test_frontend:${{ needs.test_frontend.result }}"
            "lint_python:${{ needs.lint_python.result }}"
            "test_python:${{ needs.test_python.result }}"
            "docker_build:${{ needs.docker_build.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            name="${r%%:*}"
            status="${r##*:}"
            if [[ "$status" == "failure" || "$status" == "cancelled" ]]; then
              echo "❌ $name: $status"
              failed=1
            else
              echo "✅ $name: $status"
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "❌ CI FAILED — one or more required jobs did not pass"
            exit 1
          fi
          echo ""
          echo "✅ All CI checks passed!"
