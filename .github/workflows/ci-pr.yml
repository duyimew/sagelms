name: PR Validation (Hybrid)

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------
  # Secret scan - always runs
  # --------------------------------------------------
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --redact

  # --------------------------------------------------
  # Conventions: PR Title
  # --------------------------------------------------
  pr_title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
            revert

  # --------------------------------------------------
  # Conventions: Branch Naming
  # --------------------------------------------------
  conventions_branch:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == dependabot/* ]]; then
            echo "[OK] Dependabot branch allowed"
          elif [[ ! "$BRANCH" =~ ^(feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert)\/[a-zA-Z0-9_-]+(\/[a-zA-Z0-9_-]+)*$ ]]; then
            echo "[FAIL] Invalid branch name: $BRANCH"
            echo "[OK] Expected: <type>/<slug> (e.g., feat/auth-login) or dependabot/*"
            exit 1
          fi
          echo "[OK] Branch name OK"

  # --------------------------------------------------
  # Conventions: Commit Messages
  # --------------------------------------------------
  conventions_commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint commits in PR range
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Base: $BASE"
          echo "Head: $HEAD"
          npx commitlint --from "$BASE" --to "$HEAD" --verbose

  # --------------------------------------------------
  # Path filter - detect which areas changed
  # --------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      java_services: ${{ steps.matrices.outputs.java_services }}
      docker_images: ${{ steps.matrices.outputs.docker_images }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      docker: ${{ steps.filter.outputs.docker }}
      any_relevant: ${{ steps.matrices.outputs.any_relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/path-filters.yml
      - name: Build service matrices
        id: matrices
        env:
          GATEWAY: ${{ steps.filter.outputs.gateway }}
          AUTH_SERVICE: ${{ steps.filter.outputs.auth_service }}
          COURSE_SERVICE: ${{ steps.filter.outputs.course_service }}
          CONTENT_SERVICE: ${{ steps.filter.outputs.content_service }}
          CHALLENGE_SERVICE: ${{ steps.filter.outputs.challenge_service }}
          PROGRESS_SERVICE: ${{ steps.filter.outputs.progress_service }}
          ASSESSMENT_SERVICE: ${{ steps.filter.outputs.assessment_service }}
          WORKER: ${{ steps.filter.outputs.worker }}
          FRONTEND: ${{ steps.filter.outputs.frontend }}
          INFRA: ${{ steps.filter.outputs.infra }}
          DOCKER: ${{ steps.filter.outputs.docker }}
        run: |
          java_services=()
          docker_images=()

          add_java() {
            java_services+=("\"$1\"")
          }

          add_docker() {
            service="$1"
            context="${2:-services/$1}"
            docker_images+=("{\"service\":\"${service}\",\"context\":\"${context}\"}")
          }

          add_web_docker() {
            add_docker "web" "apps/web"
          }

          if [[ "$GATEWAY" == "true" ]]; then add_java "gateway"; add_docker "gateway"; fi
          if [[ "$AUTH_SERVICE" == "true" ]]; then add_java "auth-service"; add_docker "auth-service"; fi
          if [[ "$COURSE_SERVICE" == "true" ]]; then add_java "course-service"; add_docker "course-service"; fi
          if [[ "$CONTENT_SERVICE" == "true" ]]; then add_java "content-service"; add_docker "content-service"; fi
          if [[ "$PROGRESS_SERVICE" == "true" ]]; then add_java "progress-service"; fi
          if [[ "$ASSESSMENT_SERVICE" == "true" ]]; then add_java "assessment-service"; add_docker "assessment-service"; fi
          if [[ "$CHALLENGE_SERVICE" == "true" ]]; then add_java "challenge-service"; add_docker "challenge-service"; fi
          if [[ "$WORKER" == "true" ]]; then add_java "worker"; fi
          if [[ "$FRONTEND" == "true" ]]; then add_web_docker; fi

          if [[ "$DOCKER" == "true" && ${#docker_images[@]} -eq 0 ]]; then
            add_web_docker
            add_docker "gateway"
            add_docker "auth-service"
            add_docker "course-service"
            add_docker "content-service"
            add_docker "assessment-service"
            add_docker "challenge-service"
          fi

          {
            printf "java_services=[%s]\n" "$(IFS=,; echo "${java_services[*]}")"
            printf "docker_images=[%s]\n" "$(IFS=,; echo "${docker_images[*]}")"
          } >> "$GITHUB_OUTPUT"

          if [[ ${#java_services[@]} -gt 0 || ${#docker_images[@]} -gt 0 || "$FRONTEND" == "true" || "$INFRA" == "true" || "$DOCKER" == "true" ]]; then
            echo "any_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_relevant=false" >> "$GITHUB_OUTPUT"
          fi

  # --------------------------------------------------
  # Java services - unit tests
  # --------------------------------------------------
  test_java:
    needs: changes
    if: needs.changes.outputs.java_services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.java_services) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Run tests
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw && ./mvnw -B test --no-transfer-progress
          else
            mvn -B test --no-transfer-progress
          fi

  # --------------------------------------------------
  # Java services - package smoke build
  # --------------------------------------------------
  build_java:
    needs:
      - changes
      - test_java
    if: needs.changes.outputs.java_services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.java_services) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Package service without tests
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw && ./mvnw -B package -DskipTests --no-transfer-progress
          else
            mvn -B package -DskipTests --no-transfer-progress
          fi

  # --------------------------------------------------
  # Frontend - ESLint
  # --------------------------------------------------
  lint_frontend:
    name: "Frontend: ESLint"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  # --------------------------------------------------
  # Frontend - TypeScript Type Check
  # --------------------------------------------------
  typecheck_frontend:
    name: "Frontend: TypeScript"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  # --------------------------------------------------
  # Frontend - Unit Tests (Vitest)
  # --------------------------------------------------
  test_frontend:
    name: "Frontend: Tests"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test -- --run

  # --------------------------------------------------
  # Frontend - Production Build
  # --------------------------------------------------
  build_frontend:
    name: "Frontend: Build"
    needs:
      - changes
      - test_frontend
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  # --------------------------------------------------
  # Dependency scan - report-first on GitHub-hosted
  # --------------------------------------------------
  dependency_scan:
    name: Dependency scan
    needs: changes
    if: needs.changes.outputs.any_relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  # --------------------------------------------------
  # IaC / workflow scan - Checkov
  # --------------------------------------------------
  checkov_infra:
    name: "Checkov: infra"
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on infra
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: infra

  checkov_workflows:
    name: "Checkov: workflows"
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on GitHub workflows
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .github/workflows

  # --------------------------------------------------
  # OpenTofu validation - GitHub-hosted
  # --------------------------------------------------
  infra_validate:
    name: OpenTofu validate
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0
      - name: Init
        run: tofu -chdir=infra/opentofu/envs/devsecops init -backend=false
      - name: Format check
        run: tofu fmt -check -recursive infra/opentofu
      - name: Validate
        run: tofu -chdir=infra/opentofu/envs/devsecops validate

  # --------------------------------------------------
  # Dockerfile - lint and static config scan
  # --------------------------------------------------
  dockerfile_lint:
    name: "Dockerfile: Hadolint"
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - apps/web/Dockerfile
          - services/gateway/Dockerfile
          - services/auth-service/Dockerfile
          - services/course-service/Dockerfile
          - services/content-service/Dockerfile
          - services/assessment-service/Dockerfile
          - services/challenge-service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  dockerfile_checkov:
    name: "Checkov: Dockerfiles"
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on Dockerfiles
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .
          framework: dockerfile
          soft_fail: true

  # --------------------------------------------------
  # Docker - Build and image scan smoke test (no push)
  # --------------------------------------------------
  docker_build:
    name: "Docker: Build and scan"
    needs: changes
    if: needs.changes.outputs.docker_images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.docker_images) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sagelms-${{ matrix.service }}:ci-test ${{ matrix.context }}
      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: sagelms-${{ matrix.service }}:ci-test
          format: table
          output: trivy-${{ matrix.service }}.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy image scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-scan-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.txt
          if-no-files-found: ignore

  # --------------------------------------------------
  # SonarCloud - optional GitHub-hosted quality gate
  # --------------------------------------------------
  sonarcloud:
    name: SonarCloud
    needs: changes
    if: ${{ vars.ENABLE_SONARCLOUD == 'true' && needs.changes.outputs.any_relevant == 'true' }}
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Check SonarCloud configuration
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "$SONAR_TOKEN" ]]; then
            echo "Missing repository secret: SONAR_TOKEN"
            missing=1
          fi
          if [[ -z "$SONAR_PROJECT_KEY" ]]; then
            echo "Missing repository variable: SONAR_PROJECT_KEY"
            missing=1
          fi
          if [[ -z "$SONAR_ORGANIZATION" ]]; then
            echo "Missing repository variable: SONAR_ORGANIZATION"
            missing=1
          fi
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      - name: Compile Java services for SonarCloud
        run: |
          set -euo pipefail
          for pom in services/*/pom.xml; do
            service_dir="$(dirname "$pom")"
            echo "Compiling ${service_dir}"
            if [[ -f "${service_dir}/mvnw" ]]; then
              chmod +x "${service_dir}/mvnw"
              (cd "${service_dir}" && ./mvnw -B compile -DskipTests --no-transfer-progress)
            else
              mvn -B -f "$pom" compile -DskipTests --no-transfer-progress
            fi
          done

      - name: Prepare SonarCloud Java binaries
        id: sonar_java
        run: |
          set -euo pipefail
          binaries="$(find services -path '*/target/classes' -type d | paste -sd, -)"
          if [[ -z "$binaries" ]]; then
            echo "No Java binaries found under services/*/target/classes"
            exit 1
          fi
          echo "binaries=${binaries}" >> "$GITHUB_OUTPUT"

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=apps/web,services,contracts,infra
            -Dsonar.java.binaries=${{ steps.sonar_java.outputs.binaries }}
            -Dsonar.exclusions=**/target/**,**/node_modules/**,**/dist/**,**/.terraform/**,**/venv/**,**/__pycache__/**,**/*.pyc
            -Dsonar.qualitygate.wait=true

  # --------------------------------------------------
  # Status gate - single check for branch protection
  # --------------------------------------------------
  ci_status:
    name: CI Status
    if: always()
    needs:
      - changes
      - secret_scan
      - pr_title
      - conventions_branch
      - conventions_commits
      - test_java
      - build_java
      - lint_frontend
      - typecheck_frontend
      - build_frontend
      - test_frontend
      - dependency_scan
      - checkov_infra
      - checkov_workflows
      - infra_validate
      - dockerfile_lint
      - dockerfile_checkov
      - docker_build
      - sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Check all job statuses
        run: |
          echo "=== CI Status Report ==="
          results=(
            "secret_scan:${{ needs.secret_scan.result }}"
            "changes:${{ needs.changes.result }}"
            "pr_title:${{ needs.pr_title.result }}"
            "conventions_branch:${{ needs.conventions_branch.result }}"
            "conventions_commits:${{ needs.conventions_commits.result }}"
            "test_java:${{ needs.test_java.result }}"
            "build_java:${{ needs.build_java.result }}"
            "lint_frontend:${{ needs.lint_frontend.result }}"
            "typecheck_frontend:${{ needs.typecheck_frontend.result }}"
            "build_frontend:${{ needs.build_frontend.result }}"
            "test_frontend:${{ needs.test_frontend.result }}"
            "dependency_scan:${{ needs.dependency_scan.result }}"
            "checkov_infra:${{ needs.checkov_infra.result }}"
            "checkov_workflows:${{ needs.checkov_workflows.result }}"
            "infra_validate:${{ needs.infra_validate.result }}"
            "dockerfile_lint:${{ needs.dockerfile_lint.result }}"
            "dockerfile_checkov:${{ needs.dockerfile_checkov.result }}"
            "docker_build:${{ needs.docker_build.result }}"
            "sonarcloud:${{ needs.sonarcloud.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            name="${r%%:*}"
            status="${r##*:}"
            if [[ "$status" == "failure" || "$status" == "cancelled" ]]; then
              echo "[FAIL] $name: $status"
              failed=1
            else
              echo "[OK] $name: $status"
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "[FAIL] CI FAILED - one or more required jobs did not pass"
            exit 1
          fi
          echo ""
          echo "[OK] All CI checks passed!"
