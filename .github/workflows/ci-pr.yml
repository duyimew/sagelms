name: CI - Validation PR

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, edited, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
  GCP_SECRET_SONAR_TOKEN: ${{ vars.GCP_SECRET_SONAR_TOKEN || 'sagelms-devsecops-sonarcloud-token' }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --redact

  pr_title:
    name: Validate PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
            revert

  conventions_branch:
    name: Validate branch name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == dependabot/* ]]; then
            echo "[OK] Dependabot branch allowed"
          elif [[ ! "$BRANCH" =~ ^(feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert)\/[a-zA-Z0-9_-]+(\/[a-zA-Z0-9_-]+)*$ ]]; then
            echo "[FAIL] Invalid branch name: $BRANCH"
            echo "[OK] Expected: <type>/<slug> (e.g., feat/auth-login) or dependabot/*"
            exit 1
          fi
          echo "[OK] Branch name OK"

  conventions_commits:
    name: Validate commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint commits in PR range
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Base: $BASE"
          echo "Head: $HEAD"
          npx commitlint --from "$BASE" --to "$HEAD" --verbose

  changes:
    runs-on: ubuntu-latest
    outputs:
      java_services: ${{ steps.matrices.outputs.java_services }}
      docker_images: ${{ steps.matrices.outputs.docker_images }}
      frontend: ${{ steps.matrices.outputs.frontend }}
      ai_tutor_service: ${{ steps.matrices.outputs.ai_tutor_service }}
      infra: ${{ steps.matrices.outputs.infra }}
      github: ${{ steps.matrices.outputs.github }}
      docker: ${{ steps.matrices.outputs.docker }}
      any_relevant: ${{ steps.matrices.outputs.any_relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/path-filters.yml
      - name: Build service matrices
        id: matrices
        env:
          EVENT_NAME: ${{ github.event_name }}
          GATEWAY: ${{ steps.filter.outputs.gateway }}
          AUTH_SERVICE: ${{ steps.filter.outputs.auth_service }}
          COURSE_SERVICE: ${{ steps.filter.outputs.course_service }}
          CONTENT_SERVICE: ${{ steps.filter.outputs.content_service }}
          PROGRESS_SERVICE: ${{ steps.filter.outputs.progress_service }}
          ASSESSMENT_SERVICE: ${{ steps.filter.outputs.assessment_service }}
          CHALLENGE_SERVICE: ${{ steps.filter.outputs.challenge_service }}
          AI_TUTOR_SERVICE: ${{ steps.filter.outputs.ai_tutor_service }}
          FRONTEND: ${{ steps.filter.outputs.frontend }}
          INFRA: ${{ steps.filter.outputs.infra }}
          GITHUB_WORKFLOWS: ${{ steps.filter.outputs.github }}
          DOCKER: ${{ steps.filter.outputs.docker }}
        run: |
          java_services=()
          docker_images=()
          frontend="$FRONTEND"
          ai_tutor_service="$AI_TUTOR_SERVICE"
          infra="$INFRA"
          github_workflows="$GITHUB_WORKFLOWS"
          docker="$DOCKER"

          add_java() {
            java_services+=("\"$1\"")
          }

          add_docker() {
            service="$1"
            context="${2:-services/$1}"
            docker_images+=("{\"service\":\"${service}\",\"context\":\"${context}\"}")
          }

          add_web_docker() {
            add_docker "web" "apps/web"
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            add_java "gateway"
            add_java "auth-service"
            add_java "course-service"
            add_java "content-service"
            add_java "progress-service"
            add_java "assessment-service"
            add_java "challenge-service"
            frontend="true"
            ai_tutor_service="true"
            infra="false"
            github_workflows="false"
            docker="false"
          else
            if [[ "$GATEWAY" == "true" ]]; then add_java "gateway"; add_docker "gateway"; fi
            if [[ "$AUTH_SERVICE" == "true" ]]; then add_java "auth-service"; add_docker "auth-service"; fi
            if [[ "$COURSE_SERVICE" == "true" ]]; then add_java "course-service"; add_docker "course-service"; fi
            if [[ "$CONTENT_SERVICE" == "true" ]]; then add_java "content-service"; add_docker "content-service"; fi
            if [[ "$PROGRESS_SERVICE" == "true" ]]; then add_java "progress-service"; add_docker "progress-service"; fi
            if [[ "$ASSESSMENT_SERVICE" == "true" ]]; then add_java "assessment-service"; add_docker "assessment-service"; fi
            if [[ "$CHALLENGE_SERVICE" == "true" ]]; then add_java "challenge-service"; add_docker "challenge-service"; fi
            if [[ "$FRONTEND" == "true" ]]; then add_web_docker; fi

            if [[ "$DOCKER" == "true" && ${#docker_images[@]} -eq 0 ]]; then
              add_web_docker
              add_docker "gateway"
              add_docker "auth-service"
              add_docker "course-service"
              add_docker "content-service"
              add_docker "progress-service"
              add_docker "assessment-service"
              add_docker "challenge-service"
            fi
          fi

          {
            printf "java_services=[%s]\n" "$(IFS=,; echo "${java_services[*]}")"
            printf "docker_images=[%s]\n" "$(IFS=,; echo "${docker_images[*]}")"
            printf "frontend=%s\n" "$frontend"
            printf "ai_tutor_service=%s\n" "$ai_tutor_service"
            printf "infra=%s\n" "$infra"
            printf "github=%s\n" "$github_workflows"
            printf "docker=%s\n" "$docker"
          } >> "$GITHUB_OUTPUT"

          if [[ ${#java_services[@]} -gt 0 || ${#docker_images[@]} -gt 0 || "$frontend" == "true" || "$ai_tutor_service" == "true" || "$infra" == "true" || "$github_workflows" == "true" || "$docker" == "true" ]]; then
            echo "any_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_relevant=false" >> "$GITHUB_OUTPUT"
          fi

  gcp_secret_context:
    name: GCP Secret Manager context
    needs: changes
    if: ${{ vars.ENABLE_GCP_SECRET_CONTEXT == 'true' && github.event_name == 'workflow_dispatch' && needs.changes.outputs.any_relevant == 'true' }}
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: "${{ vars.GCP_PROJECT_ID }}"
      GCP_WORKLOAD_IDENTITY_PROVIDER: "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
      GCP_SERVICE_ACCOUNT: "${{ vars.GCP_SERVICE_ACCOUNT }}"
    steps:
      - name: Check GCP workflow configuration
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "$GCP_PROJECT_ID" ]]; then
            echo "Missing repository variable: GCP_PROJECT_ID"
            missing=1
          fi
          if [[ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]]; then
            echo "Missing repository variable: GCP_WORKLOAD_IDENTITY_PROVIDER"
            missing=1
          fi
          if [[ -z "$GCP_SERVICE_ACCOUNT" ]]; then
            echo "Missing repository variable: GCP_SERVICE_ACCOUNT"
            missing=1
          fi
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify CI Secret Manager access
        run: |
          set -euo pipefail
          secrets=(
            "$GCP_SECRET_SONAR_TOKEN"
          )

          for secret in "${secrets[@]}"; do
            echo "Checking ${secret}"
            value="$(gcloud secrets versions access latest --secret "$secret" --project "$GCP_PROJECT_ID")"
            if [[ -z "$value" ]]; then
              echo "::error::${secret} has an empty latest version"
              exit 1
            fi
            echo "::add-mask::$value"
            echo "${secret}: available"
          done

  test_ai_tutor:
    name: "AI Tutor: tests"
    needs: changes
    if: needs.changes.outputs.ai_tutor_service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-tutor-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ai-tutor-service/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run Ruff
        run: python -m ruff check .
      - name: Run pytest
        run: python -m pytest

  test_java:
    needs: changes
    if: needs.changes.outputs.java_services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.java_services) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Run tests
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw && ./mvnw -B test --no-transfer-progress
          else
            mvn -B test --no-transfer-progress
          fi

  build_java:
    needs:
      - changes
      - test_java
    if: needs.changes.outputs.java_services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.java_services) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Package service without tests
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw && ./mvnw -B package -DskipTests --no-transfer-progress
          else
            mvn -B package -DskipTests --no-transfer-progress
          fi

  lint_frontend:
    name: "Frontend: ESLint"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  typecheck_frontend:
    name: "Frontend: TypeScript"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  test_frontend:
    name: "Frontend: Tests"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test -- --run

  build_frontend:
    name: "Frontend: Build"
    needs:
      - changes
      - test_frontend
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  dependency_scan:
    name: Dependency scan
    needs: changes
    if: needs.changes.outputs.any_relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  checkov_infra:
    name: "Checkov: infra"
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on infra
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: infra

  checkov_workflows:
    name: "Checkov: workflows"
    needs: changes
    if: needs.changes.outputs.infra == 'true' || needs.changes.outputs.github == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on GitHub workflows
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .github/workflows

  infra_validate:
    name: OpenTofu validate
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.0
      - name: Init
        run: tofu -chdir=infra/opentofu/envs/devsecops init -backend=false
      - name: Format check
        run: tofu fmt -check -recursive infra/opentofu
      - name: Validate
        run: tofu -chdir=infra/opentofu/envs/devsecops validate

  dockerfile_lint:
    name: "Dockerfile: Hadolint"
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - apps/web/Dockerfile
          - services/gateway/Dockerfile
          - services/auth-service/Dockerfile
          - services/course-service/Dockerfile
          - services/content-service/Dockerfile
          - services/progress-service/Dockerfile
          - services/assessment-service/Dockerfile
          - services/challenge-service/Dockerfile
          - services/ai-tutor-service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  dockerfile_checkov:
    name: "Checkov: Dockerfiles"
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on Dockerfiles
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .
          framework: dockerfile
          soft_fail: true

  docker_build:
    name: "Docker: Build and scan"
    needs: changes
    if: needs.changes.outputs.docker_images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.docker_images) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sagelms-${{ matrix.service }}:ci-test ${{ matrix.context }}
      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: sagelms-${{ matrix.service }}:ci-test
          format: table
          output: trivy-${{ matrix.service }}.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy image scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-scan-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.txt
          if-no-files-found: ignore

  sonarcloud:
    name: SonarCloud
    needs: changes
    if: ${{ vars.ENABLE_SONARCLOUD == 'true' && needs.changes.outputs.any_relevant == 'true' }}
    runs-on: ubuntu-latest
    env:
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Check SonarCloud and GCP Secret Manager configuration
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "$SONAR_PROJECT_KEY" ]]; then
            echo "Missing repository variable: SONAR_PROJECT_KEY"
            missing=1
          fi
          if [[ -z "$SONAR_ORGANIZATION" ]]; then
            echo "Missing repository variable: SONAR_ORGANIZATION"
            missing=1
          fi
          if [[ -z "$GCP_PROJECT_ID" ]]; then
            echo "Missing repository variable: GCP_PROJECT_ID"
            missing=1
          fi
          if [[ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]]; then
            echo "Missing repository variable: GCP_WORKLOAD_IDENTITY_PROVIDER"
            missing=1
          fi
          if [[ -z "$GCP_SERVICE_ACCOUNT" ]]; then
            echo "Missing repository variable: GCP_SERVICE_ACCOUNT"
            missing=1
          fi
          if [[ -z "$GCP_SECRET_SONAR_TOKEN" ]]; then
            echo "Missing repository variable: GCP_SECRET_SONAR_TOKEN"
            missing=1
          fi
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Read SonarCloud token from Secret Manager
        run: |
          set -euo pipefail
          sonar_token="$(gcloud secrets versions access latest --secret "$GCP_SECRET_SONAR_TOKEN" --project "$GCP_PROJECT_ID")"
          if [[ -z "$sonar_token" ]]; then
            echo "::error::Secret $GCP_SECRET_SONAR_TOKEN has an empty latest version"
            exit 1
          fi
          echo "::add-mask::$sonar_token"
          {
            echo "SONAR_TOKEN<<EOF"
            printf '%s\n' "$sonar_token"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Compile Java services for SonarCloud
        run: |
          set -euo pipefail
          for pom in services/*/pom.xml; do
            service_dir="$(dirname "$pom")"
            echo "Compiling ${service_dir}"
            if [[ -f "${service_dir}/mvnw" ]]; then
              chmod +x "${service_dir}/mvnw"
              (cd "${service_dir}" && ./mvnw -B compile -DskipTests --no-transfer-progress)
            else
              mvn -B -f "$pom" compile -DskipTests --no-transfer-progress
            fi
          done

      - name: Prepare SonarCloud Java binaries
        id: sonar_java
        run: |
          set -euo pipefail
          binaries="$(find services -path '*/target/classes' -type d | paste -sd, -)"
          if [[ -z "$binaries" ]]; then
            echo "No Java binaries found under services/*/target/classes"
            exit 1
          fi
          echo "binaries=${binaries}" >> "$GITHUB_OUTPUT"

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=apps/web,services,contracts,infra
            -Dsonar.java.binaries=${{ steps.sonar_java.outputs.binaries }}
            -Dsonar.exclusions=**/target/**,**/node_modules/**,**/dist/**,**/.terraform/**,**/venv/**,**/__pycache__/**,**/*.pyc
            -Dsonar.qualitygate.wait=true

  ci_status:
    name: CI Status
    if: always()
    needs:
      - changes
      - secret_scan
      - pr_title
      - conventions_branch
      - conventions_commits
      - test_ai_tutor
      - test_java
      - build_java
      - lint_frontend
      - typecheck_frontend
      - build_frontend
      - test_frontend
      - dependency_scan
      - checkov_infra
      - checkov_workflows
      - infra_validate
      - dockerfile_lint
      - dockerfile_checkov
      - docker_build
      - gcp_secret_context
      - sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Check all job statuses
        run: |
          echo "=== CI Status Report ==="
          results=(
            "secret_scan:${{ needs.secret_scan.result }}"
            "changes:${{ needs.changes.result }}"
            "pr_title:${{ needs.pr_title.result }}"
            "conventions_branch:${{ needs.conventions_branch.result }}"
            "conventions_commits:${{ needs.conventions_commits.result }}"
            "test_ai_tutor:${{ needs.test_ai_tutor.result }}"
            "test_java:${{ needs.test_java.result }}"
            "build_java:${{ needs.build_java.result }}"
            "lint_frontend:${{ needs.lint_frontend.result }}"
            "typecheck_frontend:${{ needs.typecheck_frontend.result }}"
            "build_frontend:${{ needs.build_frontend.result }}"
            "test_frontend:${{ needs.test_frontend.result }}"
            "dependency_scan:${{ needs.dependency_scan.result }}"
            "checkov_infra:${{ needs.checkov_infra.result }}"
            "checkov_workflows:${{ needs.checkov_workflows.result }}"
            "infra_validate:${{ needs.infra_validate.result }}"
            "dockerfile_lint:${{ needs.dockerfile_lint.result }}"
            "dockerfile_checkov:${{ needs.dockerfile_checkov.result }}"
            "docker_build:${{ needs.docker_build.result }}"
            "gcp_secret_context:${{ needs.gcp_secret_context.result }}"
            "sonarcloud:${{ needs.sonarcloud.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            name="${r%%:*}"
            status="${r##*:}"
            if [[ "$status" == "failure" || "$status" == "cancelled" ]]; then
              echo "[FAIL] $name: $status"
              failed=1
            else
              echo "[OK] $name: $status"
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo ""
