name: Build and Publish Image

on:
  push:
    branches: ["main"]
    paths:
      - "services/auth-service/**"
      - ".github/workflows/build-publish.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: auth-service
  SERVICE_CONTEXT: services/auth-service

jobs:
  build_scan_sbom:
    name: Build, scan, and SBOM
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_tag: ${{ steps.image.outputs.image_tag }}
      image_digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_tag="${short_sha}"
          image_ref="${SERVICE_NAME}:${image_tag}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Build local Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "${{ steps.image.outputs.image_ref }}" \
            "${SERVICE_CONTEXT}"

      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image_ref }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image_ref }}
          format: cyclonedx
          output: sbom-${{ env.SERVICE_NAME }}.cdx.json
          exit-code: "0"

      - name: Resolve local image digest
        id: digest
        run: |
          digest="$(docker image inspect "${{ steps.image.outputs.image_ref }}" --format='{{index .RepoDigests 0}}' 2>/dev/null || true)"
          if [[ -z "$digest" || "$digest" == "<no value>" ]]; then
            image_id="$(docker image inspect "${{ steps.image.outputs.image_ref }}" --format='{{.Id}}')"
            digest="${image_id}"
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Image digest/id: ${digest}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.SERVICE_NAME }}
          path: sbom-${{ env.SERVICE_NAME }}.cdx.json
          if-no-files-found: error

  publish_registry:
    name: Publish to container registry
    needs: build_scan_sbom
    if: ${{ github.ref == 'refs/heads/main' && vars.REGISTRY_HOST != '' }}
    runs-on: ubuntu-latest
    environment: devsecops-build
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Check registry configuration
        run: |
          missing=0
          if [[ -z "$REGISTRY_NAMESPACE" ]]; then
            echo "Missing GitHub Environment variable: REGISTRY_NAMESPACE"
            missing=1
          fi
          if [[ -z "$REGISTRY_USERNAME" ]]; then
            echo "Missing GitHub Environment secret: REGISTRY_USERNAME"
            missing=1
          fi
          if [[ -z "$REGISTRY_PASSWORD" ]]; then
            echo "Missing GitHub Environment secret: REGISTRY_PASSWORD"
            missing=1
          fi
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Rebuild and push image
        env:
          IMAGE_TAG: ${{ needs.build_scan_sbom.outputs.image_tag }}
        run: |
          remote_image="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/${SERVICE_NAME}:${IMAGE_TAG}"
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "${remote_image}" \
            "${SERVICE_CONTEXT}"
          docker push "${remote_image}"

      - name: Resolve pushed digest
        env:
          IMAGE_TAG: ${{ needs.build_scan_sbom.outputs.image_tag }}
        run: |
          remote_image="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/${SERVICE_NAME}:${IMAGE_TAG}"
          docker buildx imagetools inspect "${remote_image}"
