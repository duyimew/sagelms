name: Build and Publish Images

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "services/gateway/**"
      - "services/auth-service/**"
      - "services/course-service/**"
      - "services/content-service/**"
      - "services/assessment-service/**"
      - "services/challenge-service/**"
      - ".github/workflows/build-publish.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  changes:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      docker_images: ${{ steps.matrix.outputs.docker_images }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed image contexts
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - "apps/web/**"
            gateway:
              - "services/gateway/**"
            auth_service:
              - "services/auth-service/**"
            course_service:
              - "services/course-service/**"
            content_service:
              - "services/content-service/**"
            assessment_service:
              - "services/assessment-service/**"
            challenge_service:
              - "services/challenge-service/**"
            all_images:
              - ".github/workflows/build-publish.yml"

      - name: Build image matrix
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          WEB: ${{ steps.filter.outputs.web }}
          GATEWAY: ${{ steps.filter.outputs.gateway }}
          AUTH_SERVICE: ${{ steps.filter.outputs.auth_service }}
          COURSE_SERVICE: ${{ steps.filter.outputs.course_service }}
          CONTENT_SERVICE: ${{ steps.filter.outputs.content_service }}
          ASSESSMENT_SERVICE: ${{ steps.filter.outputs.assessment_service }}
          CHALLENGE_SERVICE: ${{ steps.filter.outputs.challenge_service }}
          ALL_IMAGES: ${{ steps.filter.outputs.all_images }}
        run: |
          docker_images=()

          add_image() {
            service="$1"
            context="${2:-services/$1}"
            docker_images+=("{\"service\":\"${service}\",\"context\":\"${context}\"}")
          }

          add_all_images() {
            add_image "web" "apps/web"
            add_image "gateway"
            add_image "auth-service"
            add_image "course-service"
            add_image "content-service"
            add_image "assessment-service"
            add_image "challenge-service"
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$ALL_IMAGES" == "true" ]]; then
            add_all_images
          else
            if [[ "$WEB" == "true" ]]; then add_image "web" "apps/web"; fi
            if [[ "$GATEWAY" == "true" ]]; then add_image "gateway"; fi
            if [[ "$AUTH_SERVICE" == "true" ]]; then add_image "auth-service"; fi
            if [[ "$COURSE_SERVICE" == "true" ]]; then add_image "course-service"; fi
            if [[ "$CONTENT_SERVICE" == "true" ]]; then add_image "content-service"; fi
            if [[ "$ASSESSMENT_SERVICE" == "true" ]]; then add_image "assessment-service"; fi
            if [[ "$CHALLENGE_SERVICE" == "true" ]]; then add_image "challenge-service"; fi
          fi

          printf "docker_images=[%s]\n" "$(IFS=,; echo "${docker_images[*]}")" >> "$GITHUB_OUTPUT"

  build_scan_sbom:
    name: Build, scan, and SBOM
    needs: changes
    if: needs.changes.outputs.docker_images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.docker_images) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build local Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "${{ matrix.service }}:${IMAGE_TAG}" \
            "${{ matrix.context }}"

      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: cyclonedx
          output: sbom-${{ matrix.service }}.cdx.json
          exit-code: "0"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json
          if-no-files-found: error

  publish_registry:
    name: Publish to container registry
    needs:
      - changes
      - build_scan_sbom
    if: ${{ github.ref == 'refs/heads/main' && needs.changes.outputs.docker_images != '[]' }}
    runs-on: ubuntu-latest
    environment: devsecops-build
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.docker_images) }}
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Check registry configuration
        id: registry_config
        run: |
          clean_registry_host="$(printf '%s' "$REGISTRY_HOST" | tr -d '[:space:]')"
          clean_registry_namespace="$(printf '%s' "$REGISTRY_NAMESPACE" | tr -d '[:space:]')"

          missing=0
          if [[ -z "$clean_registry_host" ]]; then
            echo "Missing GitHub Environment variable: REGISTRY_HOST"
            missing=1
          fi
          if [[ -z "$clean_registry_namespace" ]]; then
            echo "Missing GitHub Environment variable: REGISTRY_NAMESPACE"
            missing=1
          fi
          if [[ -z "$REGISTRY_USERNAME" ]]; then
            echo "Missing GitHub Environment secret: REGISTRY_USERNAME"
            missing=1
          fi
          if [[ -z "$REGISTRY_PASSWORD" ]]; then
            echo "Missing GitHub Environment secret: REGISTRY_PASSWORD"
            missing=1
          fi
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi
          {
            echo "registry_host=${clean_registry_host}"
            echo "registry_namespace=${clean_registry_namespace}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ steps.registry_config.outputs.registry_host }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push image
        id: publish
        env:
          CLEAN_REGISTRY_HOST: ${{ steps.registry_config.outputs.registry_host }}
          CLEAN_REGISTRY_NAMESPACE: ${{ steps.registry_config.outputs.registry_namespace }}
        run: |
          remote_image="${CLEAN_REGISTRY_HOST}/${CLEAN_REGISTRY_NAMESPACE}/${{ matrix.service }}:${IMAGE_TAG}"
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "${remote_image}" \
            "${{ matrix.context }}"
          docker push "${remote_image}"
          echo "remote_image=${remote_image}" >> "$GITHUB_OUTPUT"

      - name: Resolve pushed digest
        id: digest
        env:
          CLEAN_REGISTRY_HOST: ${{ steps.registry_config.outputs.registry_host }}
          CLEAN_REGISTRY_NAMESPACE: ${{ steps.registry_config.outputs.registry_namespace }}
        run: |
          remote_image="${{ steps.publish.outputs.remote_image }}"
          repo_digest="$(docker buildx imagetools inspect "${remote_image}" | awk '/Digest:/ {print $2; exit}')"
          if [[ -z "$repo_digest" ]]; then
            echo "Could not resolve digest for ${remote_image}"
            exit 1
          fi
          digest_ref="${CLEAN_REGISTRY_HOST}/${CLEAN_REGISTRY_NAMESPACE}/${{ matrix.service }}@${repo_digest}"
          {
            echo "service=${{ matrix.service }}"
            echo "tagged_image=${remote_image}"
            echo "digest_image=${digest_ref}"
          } | tee image-digest-${{ matrix.service }}.txt
          {
            echo "repo_digest=${repo_digest}"
            echo "digest_image=${digest_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM for pushed digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.digest.outputs.digest_image }}
          format: cyclonedx
          output: sbom-${{ matrix.service }}.cdx.json
          exit-code: "0"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.service }}
          path: image-digest-${{ matrix.service }}.txt
          if-no-files-found: error

      - name: Upload pushed image SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pushed-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json
          if-no-files-found: error
