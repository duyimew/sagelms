name: Build and Publish Images

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "services/gateway/**"
      - "services/auth-service/**"
      - "services/course-service/**"
      - "services/content-service/**"
      - "services/assessment-service/**"
      - "services/challenge-service/**"
      - ".github/workflows/build-publish.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build_scan_sbom:
    name: Build, scan, and SBOM
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: apps/web
          - service: gateway
            context: services/gateway
          - service: auth-service
            context: services/auth-service
          - service: course-service
            context: services/course-service
          - service: content-service
            context: services/content-service
          - service: assessment-service
            context: services/assessment-service
          - service: challenge-service
            context: services/challenge-service
    steps:
      - uses: actions/checkout@v4

      - name: Build local Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "${{ matrix.service }}:${IMAGE_TAG}" \
            "${{ matrix.context }}"

      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: cyclonedx
          output: sbom-${{ matrix.service }}.cdx.json
          exit-code: "0"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json
          if-no-files-found: error

  publish_registry:
    name: Publish to container registry
    needs: build_scan_sbom
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: devsecops-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: apps/web
          - service: gateway
            context: services/gateway
          - service: auth-service
            context: services/auth-service
          - service: course-service
            context: services/course-service
          - service: content-service
            context: services/content-service
          - service: assessment-service
            context: services/assessment-service
          - service: challenge-service
            context: services/challenge-service
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Check registry configuration
        run: |
          missing=0
          if [[ -z "$REGISTRY_HOST" ]]; then
            echo "Missing GitHub Environment variable: REGISTRY_HOST"
            missing=1
          fi
          if [[ -z "$REGISTRY_NAMESPACE" ]]; then
            echo "Missing GitHub Environment variable: REGISTRY_NAMESPACE"
            missing=1
          fi
          if [[ -z "$REGISTRY_USERNAME" ]]; then
            echo "Missing GitHub Environment secret: REGISTRY_USERNAME"
            missing=1
          fi
          if [[ -z "$REGISTRY_PASSWORD" ]]; then
            echo "Missing GitHub Environment secret: REGISTRY_PASSWORD"
            missing=1
          fi
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      - name: Login to container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push image
        id: publish
        run: |
          remote_image="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/${{ matrix.service }}:${IMAGE_TAG}"
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "${remote_image}" \
            "${{ matrix.context }}"
          docker push "${remote_image}"
          echo "remote_image=${remote_image}" >> "$GITHUB_OUTPUT"

      - name: Resolve pushed digest
        id: digest
        run: |
          remote_image="${{ steps.publish.outputs.remote_image }}"
          repo_digest="$(docker buildx imagetools inspect "${remote_image}" | awk '/Digest:/ {print $2; exit}')"
          if [[ -z "$repo_digest" ]]; then
            echo "Could not resolve digest for ${remote_image}"
            exit 1
          fi
          digest_ref="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/${{ matrix.service }}@${repo_digest}"
          {
            echo "service=${{ matrix.service }}"
            echo "tagged_image=${remote_image}"
            echo "digest_image=${digest_ref}"
          } | tee image-digest-${{ matrix.service }}.txt
          {
            echo "repo_digest=${repo_digest}"
            echo "digest_image=${digest_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM for pushed digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.digest.outputs.digest_image }}
          format: cyclonedx
          output: sbom-${{ matrix.service }}.cdx.json
          exit-code: "0"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.service }}
          path: image-digest-${{ matrix.service }}.txt
          if-no-files-found: error

      - name: Upload pushed image SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pushed-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json
          if-no-files-found: error
