services:
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sagelms-sonarqube-db
    environment:
      POSTGRES_DB: ${SONARQUBE_DB_NAME:-sonarqube}
      POSTGRES_USER: ${SONARQUBE_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonar}
    volumes:
      - sagelms_sonarqube_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONARQUBE_DB_USER:-sonar} -d ${SONARQUBE_DB_NAME:-sonarqube}"]
      interval: 10s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:lts-community
    container_name: sagelms-sonarqube
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONARQUBE_DB_NAME:-sonarqube}
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonar}
    ports:
      - "${SONARQUBE_PORT:-9000}:9000"
    volumes:
      - sagelms_sonarqube_data:/opt/sonarqube/data
      - sagelms_sonarqube_extensions:/opt/sonarqube/extensions
      - sagelms_sonarqube_logs:/opt/sonarqube/logs

volumes:
  sagelms_sonarqube_db:
  sagelms_sonarqube_data:
  sagelms_sonarqube_extensions:
  sagelms_sonarqube_logs: