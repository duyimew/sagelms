services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sagelms}
      POSTGRES_USER: ${POSTGRES_USER:-sagelms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sagelms_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sagelms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - sagelms_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@sagelms.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - sagelms_pgadmin:/var/lib/pgadmin

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger-ui
    environment:
      SWAGGER_JSON: /specs/gateway.yaml
    ports:
      - "9090:8080"
    volumes:
      - ../../contracts/openapi:/specs:ro

  # --- Application Services (optional, build from source) ---

  gateway:
    build:
      context: ../../services/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-sagelms-dev-jwt-secret-min-32-chars!}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-sagelms-dev-gateway-secret}
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 8081
      COURSE_SERVICE_HOST: course-service
      COURSE_SERVICE_PORT: 8082
      CONTENT_SERVICE_HOST: content-service
      CONTENT_SERVICE_PORT: 8083
      ASSESSMENT_SERVICE_HOST: assessment-service
      ASSESSMENT_SERVICE_PORT: 8085
      CHALLENGE_SERVICE_HOST: challenge-service
      CHALLENGE_SERVICE_PORT: 8086
    depends_on:
      auth-service:
        condition: service_started
      course-service:
        condition: service_started
      content-service:
        condition: service_started
      assessment-service:
        condition: service_started
      challenge-service:
        condition: service_started
    profiles:
      - app

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      JWT_SECRET: ${JWT_SECRET:-sagelms-dev-jwt-secret-min-32-chars!}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-sagelms-dev-gateway-secret}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-sagelms-dev-internal-secret}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sagelms}
      DB_USER: ${POSTGRES_USER:-sagelms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app

  course-service:
    build:
      context: ../../services/course-service
      dockerfile: Dockerfile
    expose:
      - "8082"
    environment:
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-sagelms-dev-gateway-secret}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-sagelms-dev-internal-secret}
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sagelms}
      DB_USER: ${POSTGRES_USER:-sagelms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app

  content-service:
    build:
      context: ../../services/content-service
      dockerfile: Dockerfile
    expose:
      - "8083"
    environment:
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-sagelms-dev-gateway-secret}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-sagelms-dev-internal-secret}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sagelms}
      DB_USER: ${POSTGRES_USER:-sagelms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
      COURSE_SERVICE_HOST: course-service
      COURSE_SERVICE_PORT: 8082
      CONTENT_UPLOAD_DIR: /data/content-uploads
    volumes:
      - sagelms_content_uploads:/data/content-uploads
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app

  assessment-service:
    build:
      context: ../../services/assessment-service
      dockerfile: Dockerfile
    expose:
      - "8085"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sagelms}
      DB_USER: ${POSTGRES_USER:-sagelms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
      COURSE_SERVICE_HOST: course-service
      COURSE_SERVICE_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      course-service:
        condition: service_started
    profiles:
      - app

  challenge-service:
    build:
      context: ../../services/challenge-service
      dockerfile: Dockerfile
    expose:
      - "8086"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sagelms}
      DB_USER: ${POSTGRES_USER:-sagelms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sagelms}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app

volumes:
  sagelms_pg:
  sagelms_redis:
  sagelms_pgadmin:
  sagelms_content_uploads:
