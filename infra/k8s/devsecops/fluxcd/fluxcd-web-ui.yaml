apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: flux-operator-chart
  namespace: fluxcd
spec:
  interval: 30m
  url: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: "*"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-web
  namespace: fluxcd
spec:
  interval: 30m
  releaseName: flux-web
  chartRef:
    kind: OCIRepository
    name: flux-operator-chart
  values:
    fullnameOverride: flux-web
    installCRDs: true
    web:
      enabled: true
      serverOnly: true
      networkPolicy:
        create: true
      rbac:
        createRoles: true