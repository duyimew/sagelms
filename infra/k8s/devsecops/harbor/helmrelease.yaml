apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor
    app.kubernetes.io/part-of: sagelms
spec:
  interval: 10m
  releaseName: harbor
  targetNamespace: harbor
  chart:
    spec:
      chart: harbor
      version: "1.19.0"
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: harbor
      interval: 1h
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    externalURL: https://harbor.sagelms.id.vn
    expose:
      type: clusterIP
      tls:
        enabled: false
      clusterIP:
        name: harbor
        ports:
          httpPort: 80
          httpsPort: 443
    persistence:
      enabled: true
